name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Show Python environment
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest -vv -ra
  publish:
    needs:
      - test
    runs-on: ubuntu-latest

    # Only run on tag push
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      github.event_name == 'push' &&
      github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ensure tag points to latest commit on main
        run: |
          git fetch origin main
          TAG_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git rev-parse origin/main)
          
          echo "Tag commit:  $TAG_COMMIT"
          echo "Main commit: $MAIN_COMMIT"
          
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "❌ Tag does not point to the latest commit on main"
            exit 1
          fi
      - name: Check that tag version matches pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f2)
          
          echo "Tag version: $TAG_VERSION"
          echo "File version: $FILE_VERSION"
          
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "❌ Tag version (v$TAG_VERSION) does not match version in pyproject.toml ($FILE_VERSION)"
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Check that pyproject.toml and doxa/__version__.py are in sync
        run: |
          VERSION_PYPROJECT=$(grep '^version =' pyproject.toml | cut -d '"' -f2)
          VERSION_RUNTIME=$(grep '^__version__ =' doxa/__version__.py | cut -d '"' -f2)
          if [ "$VERSION_PYPROJECT" != "$VERSION_RUNTIME" ]; then
            echo "❌ Version mismatch between pyproject.toml and doxa/__version__.py"
            exit 1
          fi
      - name: Build package
        run: python -m build
      - name: Check distribution
        run: python -m twine check dist/*
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*