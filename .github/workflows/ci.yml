name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@1.89

      - name: Show toolchain versions
        run: |
          python --version
          python -m pip --version
          rustc --version
          cargo --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,postgres]"

      - name: Run test suite
        run: pytest -vv -ra

  release_checks:
    name: Release Checks
    needs:
      - test
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      github.event_name == 'push' &&
      github.ref_type == 'tag'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag points to latest commit on main
        run: |
          git fetch origin main
          TAG_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git rev-parse origin/main)

          echo "Tag commit:  $TAG_COMMIT"
          echo "Main commit: $MAIN_COMMIT"

          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "Tag does not point to the latest commit on main"
            exit 1
          fi

      - name: Validate release versions
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          tag_version = os.environ["GITHUB_REF"].removeprefix("refs/tags/v")
          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          runtime = pathlib.Path("doxa/__version__.py").read_text(encoding="utf-8")

          pyproject_match = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.MULTILINE)
          runtime_match = re.search(r'^__version__\s*=\s*"([^"]+)"', runtime, re.MULTILINE)
          if not pyproject_match or not runtime_match:
              raise SystemExit("Could not parse project versions")

          pyproject_version = pyproject_match.group(1)
          runtime_version = runtime_match.group(1)

          print(f"Tag version:       {tag_version}")
          print(f"pyproject version: {pyproject_version}")
          print(f"runtime version:   {runtime_version}")

          if tag_version != pyproject_version:
              raise SystemExit("Tag version does not match pyproject.toml")
          if pyproject_version != runtime_version:
              raise SystemExit("pyproject.toml and doxa/__version__.py are out of sync")
          PY

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: latest
          rust-toolchain: 1.89
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build_wheels:
    name: Build wheels (${{ matrix.os }})
    needs:
      - release_checks
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python_bin: .smoke-venv/bin/python
            cli_bin: .smoke-venv/bin/doxa
          - os: macos-latest
            python_bin: .smoke-venv/bin/python
            cli_bin: .smoke-venv/bin/doxa
          - os: windows-latest
            python_bin: .smoke-venv/Scripts/python.exe
            cli_bin: .smoke-venv/Scripts/doxa.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: latest
          rust-toolchain: 1.89
          command: build
          args: --release --out dist --interpreter python

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv .smoke-venv
          "${{ matrix.python_bin }}" -m pip install --upgrade pip
          "${{ matrix.python_bin }}" -m pip install dist/*.whl
          "${{ matrix.python_bin }}" -c "import doxa"
          "${{ matrix.python_bin }}" -c "import doxa._native"
          "${{ matrix.cli_bin }}" --help

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs:
      - build_wheels
    runs-on: ubuntu-latest

    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      github.event_name == 'push' &&
      github.ref_type == 'tag'

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
